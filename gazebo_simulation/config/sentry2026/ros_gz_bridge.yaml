# ROS 2 control input for the planar drive controller.
- ros_topic_name: "/cmd_vel"
  gz_topic_name: "/model/sentry/cmd_vel"
  ros_type_name: "geometry_msgs/msg/Twist"
  gz_type_name: "gz.msgs.Twist"
  direction: ROS_TO_GZ

# Odometry and transform topics published by Gazebo's OdometryPublisher.
- ros_topic_name: "/odom"
  gz_topic_name: "/model/sentry/odometry"
  ros_type_name: "nav_msgs/msg/Odometry"
  gz_type_name: "gz.msgs.Odometry"
  direction: GZ_TO_ROS

- ros_topic_name: "/tf"
  gz_topic_name: "/model/sentry/pose"
  ros_type_name: "tf2_msgs/msg/TFMessage"
  gz_type_name: "gz.msgs.Pose_V"
  direction: GZ_TO_ROS
